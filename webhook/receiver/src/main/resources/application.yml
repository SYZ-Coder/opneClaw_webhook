server:
  port: 8082

spring:
  application:
    name: openclaw-receiver
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# Receiver Configuration
receiver:
  openclaw:
    webhook:
      secret: ${OPENCLAW_WEBHOOK_SECRET:your-webhook-secret}
      allowed-origins: "*"
      max-payload-size: 1MB

# Logging
logging:
  level:
    com.example.demo: DEBUG
    org.springframework.web: DEBUG